<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Character encoding — supports emojis and special characters -->
    <meta charset="UTF-8" />

    <!-- Responsive design — scales properly on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO: Page title (shows in browser tab) -->
    <title>Enterprise RAG Chatbot — Chat With Your Documents</title>

    <!-- SEO: Description (shows in Google search results) -->
    <meta 
      name="description" 
      content="AI-powered chatbot that answers questions from your uploaded documents using Retrieval-Augmented Generation. Built with React, FastAPI, and Google Gemini." 
    />

    <!-- SEO: Keywords -->
    <meta name="keywords" content="RAG, chatbot, AI, document, search, Gemini, LangChain" />

    <!-- Favicon (browser tab icon) — using an emoji for now -->
    <link 
      rel="icon" 
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" 
    />

    <!-- Google Fonts: Inter — our primary font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link 
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" 
      rel="stylesheet" 
    />
  </head>

  <body>
    <!-- React mounts the entire app inside this div -->
    <div id="root"></div>

    <!-- Vite injects the JavaScript bundle here -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
